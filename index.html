<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hasil Penyisihan Galaxy 2026 MAI Amanatul Ummah</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .bg-galaxy { background: radial-gradient(circle at top right, #1e1b4b, #0f172a); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        .markdown-content ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1rem; }
        .markdown-content p { margin-bottom: 0.75rem; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSHhgSRL0FWemqLfaSsoJSBcWIld2aCGnjWz4XCiFvEsdKuC6Tj965e1wgEi3jLKQiFTTypiCfaO1pu/pub?gid=876499991&single=true&output=csv";
        const apiKey = ""; // API Key disediakan oleh environment

        const App = () => {
            const [data, setData] = useState([]);
            const [participantId, setParticipantId] = useState('');
            const [password, setPassword] = useState('');
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState('');
            const [authLoading, setAuthLoading] = useState(false);
            
            // State untuk Gemini AI
            const [aiAdvice, setAiAdvice] = useState('');
            const [aiLoading, setAiLoading] = useState(false);

            useEffect(() => {
                const fetchData = async () => {
                    try {
                        const response = await fetch(SHEET_URL);
                        if (!response.ok) throw new Error("Gagal mengambil file.");
                        const csvText = await response.text();
                        const parsedData = parseCSV(csvText);
                        setData(parsedData);
                        setLoading(false);
                    } catch (err) {
                        setError("Gagal terhubung ke database.");
                        setLoading(false);
                    }
                };
                fetchData();
            }, []);

            const parseCSV = (text) => {
                const lines = text.split(/\r?\n/);
                if (lines.length < 2) return [];
                const headers = lines[0].split(',').map(h => h.trim().toLowerCase().replace(/^"|"$/g, ''));
                return lines.slice(1).map(line => {
                    if (!line.trim()) return null;
                    const regex = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/;
                    const values = line.split(regex).map(v => v.trim().replace(/^"|"$/g, ''));
                    const obj = {};
                    headers.forEach((header, index) => {
                        obj[header] = values[index] || "";
                    });
                    return obj;
                }).filter(item => item && item.id);
            };

            const callGeminiAI = async (participant) => {
                setAiLoading(true);
                const isLolos = participant.status.toLowerCase() === "lolos";
                
                const systemPrompt = `Anda adalah Mentor AI untuk kompetisi 'Galaxy 2026' di MAI Amanatul Ummah. 
                Berikan respon yang ramah, profesional, dan memberikan motivasi dalam Bahasa Indonesia. 
                Gunakan format yang rapi (bullet points jika perlu).`;
                
                const userQuery = `Nama Siswa: ${participant.namasiswa}
                Bidang: ${participant['bidang lomba']}
                Skor: ${participant.skor}
                Peringkat: ${participant.peringkat}
                Status: ${participant.status}

                Jika status Lolos, berikan:
                1. Ucapan selamat yang personal.
                2. 3 Tips spesifik persiapan babak Quarter Final untuk bidang tersebut.
                
                Jika status Tidak Lolos, berikan:
                1. Kata-kata motivasi yang menyentuh dan menyemangati.
                2. 2 Saran spesifik untuk pengembangan diri di bidang tersebut agar sukses di masa depan.`;

                const fetchWithRetry = async (retries = 5, delay = 1000) => {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: userQuery }] }],
                                systemInstruction: { parts: [{ text: systemPrompt }] }
                            })
                        });
                        
                        if (!response.ok) throw new Error('API Error');
                        const result = await response.json();
                        return result.candidates?.[0]?.content?.parts?.[0]?.text;
                    } catch (err) {
                        if (retries > 0) {
                            await new Promise(res => setTimeout(res, delay));
                            return fetchWithRetry(retries - 1, delay * 2);
                        }
                        throw err;
                    }
                };

                try {
                    const text = await fetchWithRetry();
                    setAiAdvice(text);
                } catch (err) {
                    setAiAdvice("Maaf, Mentor AI sedang sibuk. Silakan coba beberapa saat lagi untuk mendapatkan analisis personal Anda.");
                } finally {
                    setAiLoading(false);
                }
            };

            const handleLogin = (e) => {
                e.preventDefault();
                setAuthLoading(true);
                setError('');

                setTimeout(() => {
                    const found = data.find(p => 
                        String(p.id).trim() === String(participantId).trim() && 
                        String(p.password).trim() === String(password).trim()
                    );

                    if (found) {
                        setUser(found);
                    } else {
                        setError('Nomor peserta atau password salah.');
                    }
                    setAuthLoading(false);
                }, 600);
            };

            const handleLogout = () => {
                setUser(null);
                setParticipantId('');
                setPassword('');
                setAiAdvice('');
            };

            if (loading) return (
                <div className="min-h-screen flex flex-col items-center justify-center space-y-4">
                    <div className="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                    <p className="text-slate-500 font-bold uppercase tracking-widest text-xs text-center">Menghubungkan Galaxy Database...</p>
                </div>
            );

            if (!user) {
                return (
                    <div className="min-h-screen flex flex-col justify-center items-center p-4 bg-slate-100">
                        <div className="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl overflow-hidden animate-fade-in border border-white">
                            <div className="bg-galaxy p-10 text-center text-white">
                                <h1 className="text-2xl font-black uppercase italic tracking-tighter">Hasil Penyisihan</h1>
                                <p className="text-indigo-200 mt-1 text-xs font-bold tracking-widest uppercase">Galaxy 2026 MAI Amanatul Ummah</p>
                            </div>
                            <form onSubmit={handleLogin} className="p-8 space-y-6">
                                {error && <div className="bg-red-50 text-red-600 p-4 rounded-2xl text-xs font-bold border border-red-100">{error}</div>}
                                <div className="space-y-4">
                                    <input type="text" value={participantId} onChange={(e) => setParticipantId(e.target.value)} placeholder="ID Peserta" className="w-full px-6 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-100 outline-none font-bold shadow-inner" required />
                                    <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} placeholder="Kata Sandi" className="w-full px-6 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-100 outline-none font-bold shadow-inner" required />
                                </div>
                                <button type="submit" className="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black text-sm uppercase tracking-widest shadow-xl hover:bg-indigo-700 active:scale-95 transition-all">
                                    {authLoading ? "Mengecek..." : "Cek Hasil"}
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            const isLolos = user.status.toLowerCase() === "lolos";

            return (
                <div className="min-h-screen bg-[#f8fafc] pb-20 animate-fade-in">
                    <nav className="bg-white/90 backdrop-blur-md border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
                        <div className="flex items-center gap-2">
                            <div className="bg-indigo-600 p-1.5 rounded-lg text-white">
                                <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>
                            </div>
                            <span className="font-black text-slate-800 italic uppercase text-sm">Galaxy 2026</span>
                        </div>
                        <button onClick={handleLogout} className="text-slate-400 font-bold text-[10px] uppercase bg-slate-50 px-4 py-2 rounded-xl border border-slate-200 hover:text-red-500 transition-colors">Keluar</button>
                    </nav>

                    <main className="max-w-4xl mx-auto mt-8 px-4">
                        <div className={`rounded-[3rem] p-12 mb-8 text-center shadow-2xl text-white relative overflow-hidden ${isLolos ? 'bg-gradient-to-br from-indigo-600 via-blue-700 to-emerald-600' : 'bg-gradient-to-br from-slate-700 to-slate-900'}`}>
                            <h2 className="text-4xl md:text-6xl font-black mb-4 tracking-tighter uppercase italic">{isLolos ? 'Lolos Quarter Final!' : 'Belum Berhasil'}</h2>
                            <p className="font-bold opacity-80">{isLolos ? `Selamat! Anda melaju ke babak selanjutnya bidang ${user['bidang lomba']}.` : 'Terima kasih atas partisipasi Anda di Galaxy 2026.'}</p>
                            <div className="absolute top-0 left-0 w-full h-full opacity-5 pointer-events-none">
                                <div className="absolute -top-10 left-10 w-40 h-40 bg-white rounded-full blur-3xl"></div>
                            </div>
                        </div>

                        <div className="grid md:grid-cols-5 gap-8">
                            <div className="md:col-span-3 space-y-6">
                                <div className="bg-white rounded-[2rem] p-8 shadow-sm border border-slate-200">
                                    <h3 className="text-sm font-black text-slate-800 mb-6 uppercase tracking-widest flex items-center gap-2">
                                        <div className="w-1.5 h-1.5 bg-indigo-600 rounded-full"></div>
                                        Profil Peserta
                                    </h3>
                                    <div className="space-y-4">
                                        <div className="flex justify-between py-4 border-b border-slate-50">
                                            <span className="text-slate-400 text-[10px] font-black uppercase">Nama Lengkap</span>
                                            <span className="font-black text-sm">{user.namasiswa}</span>
                                        </div>
                                        <div className="flex justify-between py-4 border-b border-slate-50">
                                            <span className="text-slate-400 text-[10px] font-black uppercase">No Peserta</span>
                                            <span className="font-mono font-black text-indigo-600">{user.id}</span>
                                        </div>
                                        <div className="flex justify-between py-4 border-b border-slate-50">
                                            <span className="text-slate-400 text-[10px] font-black uppercase">Bidang Lomba</span>
                                            <span className="font-black text-indigo-800 bg-indigo-50 px-3 py-1 rounded-full text-xs">{user['bidang lomba']}</span>
                                        </div>
                                        <div className="flex justify-between py-4">
                                            <span className="text-slate-400 text-[10px] font-black uppercase">Asal Sekolah</span>
                                            <span className="font-black text-sm">{user.asalsekolah}</span>
                                        </div>
                                    </div>
                                </div>

                                {/* Gemini AI Feature */}
                                <div className="bg-white rounded-[2rem] p-8 shadow-sm border border-indigo-100 bg-gradient-to-b from-white to-indigo-50/30">
                                    <h3 className="text-sm font-black text-indigo-600 mb-6 uppercase tracking-widest flex items-center gap-2">
                                        <div className="w-1.5 h-1.5 bg-indigo-600 rounded-full"></div>
                                        ✨ Mentor AI Galaxy
                                    </h3>
                                    
                                    {!aiAdvice && !aiLoading && (
                                        <div className="text-center py-4">
                                            <p className="text-xs text-slate-500 mb-6 font-medium italic">Klik untuk mendapatkan analisis hasil dan rekomendasi belajar dari Mentor AI kami.</p>
                                            <button 
                                                onClick={() => callGeminiAI(user)}
                                                className="bg-indigo-600 text-white px-8 py-3 rounded-2xl font-bold text-xs uppercase tracking-widest shadow-lg shadow-indigo-100 hover:scale-105 transition-transform flex items-center gap-2 mx-auto"
                                            >
                                                ✨ Analisis Hasil Saya
                                            </button>
                                        </div>
                                    )}

                                    {aiLoading && (
                                        <div className="text-center py-8">
                                            <div className="w-8 h-8 border-3 border-indigo-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                                            <p className="text-[10px] font-bold text-indigo-400 uppercase tracking-widest animate-pulse">Mentor sedang meninjau data Anda...</p>
                                        </div>
                                    )}

                                    {aiAdvice && (
                                        <div className="animate-fade-in">
                                            <div className="prose prose-sm max-w-none text-slate-700 font-medium leading-relaxed markdown-content bg-white p-6 rounded-2xl border border-indigo-50 shadow-inner">
                                                {aiAdvice.split('\n').map((line, i) => {
                                                    if (line.trim().startsWith('* ') || line.trim().startsWith('- ')) {
                                                        return <li key={i} className="ml-4 list-disc mb-1">{line.trim().substring(2)}</li>;
                                                    }
                                                    return line.trim() === "" ? <br key={i} /> : <p key={i}>{line}</p>;
                                                })}
                                            </div>
                                            <button 
                                                onClick={() => setAiAdvice('')}
                                                className="mt-6 text-[10px] font-black text-indigo-400 uppercase tracking-widest hover:text-indigo-600 transition-colors block mx-auto"
                                            >
                                                ↻ Tanya Ulang
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </div>

                            <div className="md:col-span-2 space-y-6">
                                <div className="bg-white rounded-[2rem] p-8 shadow-sm border border-slate-200">
                                    <h3 className="text-[10px] font-black text-slate-400 mb-6 uppercase tracking-widest">Statistik Penilaian</h3>
                                    <div className="space-y-4">
                                        <div className="bg-slate-50 p-6 rounded-3xl text-center border border-slate-100">
                                            <p className="text-[10px] font-black text-slate-400 mb-2 uppercase">Skor Akhir</p>
                                            <p className="text-4xl font-black text-indigo-700 tracking-tighter">{user.skor}</p>
                                        </div>
                                        <div className="bg-slate-50 p-6 rounded-3xl text-center border border-slate-100">
                                            <p className="text-[10px] font-black text-slate-400 mb-2 uppercase">Peringkat</p>
                                            <p className="text-4xl font-black text-slate-800 tracking-tighter">#{user.peringkat}</p>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-white rounded-[2rem] p-8 shadow-sm border border-slate-200 sticky top-24">
                                    <h3 className="text-xs font-black text-slate-400 mb-6 uppercase tracking-widest">Navigasi Utama</h3>
                                    {isLolos && (
                                        <div className="p-6 bg-emerald-50 rounded-3xl border border-emerald-100 mb-6 shadow-sm">
                                            <p className="text-[10px] font-black text-emerald-900 mb-2 uppercase">Koordinasi</p>
                                            <a href={user.wagroup.startsWith('http') ? user.wagroup : `https://${user.wagroup}`} target="_blank" className="w-full bg-emerald-600 text-white py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest flex items-center justify-center gap-2 hover:bg-emerald-700 transition-all shadow-lg shadow-emerald-100">Gabung Grup WA</a>
                                        </div>
                                    )}
                                    <div className="p-6 bg-slate-50 rounded-3xl border border-slate-100">
                                        <p className="text-[10px] font-black text-slate-800 mb-2 uppercase tracking-widest">Bantuan</p>
                                        <div className="flex items-center gap-3 bg-white p-3 rounded-xl border border-slate-200 shadow-sm cursor-pointer group">
                                            <div className="p-2 bg-indigo-50 rounded-lg group-hover:bg-indigo-600 group-hover:text-white transition-all text-indigo-600">
                                                <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                                            </div>
                                            <span className="text-[10px] font-bold text-slate-600 group-hover:text-indigo-600 transition-colors uppercase">Panitia MAI</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>

                    <footer className="text-center mt-20 pb-10">
                        <div className="w-12 h-1 bg-indigo-100 mx-auto rounded-full mb-6"></div>
                        <p className="text-slate-400 text-[10px] font-black uppercase tracking-[0.4em]">Galaxy 2026 MAI Amanatul Ummah</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
