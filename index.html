<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hasil Penyisihan Galaxy 2026 MAI Amanatul Ummah</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .bg-galaxy { background: radial-gradient(circle at top right, #1e1b4b, #0f172a); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // URL CSV Google Sheets Anda yang sudah diperbarui
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSHhgSRL0FWemqLfaSsoJSBcWIld2aCGnjWz4XCiFvEsdKuC6Tj965e1wgEi3jLKQiFTTypiCfaO1pu/pub?gid=876499991&single=true&output=csv";

        const App = () => {
            const [data, setData] = useState([]);
            const [participantId, setParticipantId] = useState('');
            const [password, setPassword] = useState('');
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState('');
            const [authLoading, setAuthLoading] = useState(false);

            useEffect(() => {
                const fetchData = async () => {
                    try {
                        const response = await fetch(SHEET_URL);
                        if (!response.ok) throw new Error("Gagal mengambil file.");
                        let csvText = await response.text();
                        
                        // Menghapus karakter BOM tersembunyi (\ufeff) yang sering ada di awal CSV Google Sheets
                        csvText = csvText.replace(/^\uFEFF/, '');
                        
                        const parsedData = parseCSV(csvText);
                        setData(parsedData);
                        setLoading(false);
                    } catch (err) {
                        console.error("Fetch Error:", err);
                        setError("Gagal terhubung ke database. Cek koneksi internet atau link spreadsheet.");
                        setLoading(false);
                    }
                };
                fetchData();
            }, []);

            const parseCSV = (text) => {
                const lines = text.split(/\r?\n/);
                if (lines.length < 2) return [];

                // Ambil header, bersihkan spasi dan ubah ke lowercase
                const headers = lines[0].split(',').map(h => h.trim().toLowerCase().replace(/^"|"$/g, ''));

                return lines.slice(1).map(line => {
                    if (!line.trim()) return null;
                    
                    // Regex untuk memisahkan koma tapi mengabaikan koma di dalam tanda kutip
                    const regex = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/;
                    const values = line.split(regex).map(v => v.trim().replace(/^"|"$/g, ''));
                    
                    const obj = {};
                    headers.forEach((header, index) => {
                        obj[header] = values[index] || "";
                    });
                    return obj;
                }).filter(item => item && item.id);
            };

            const handleLogin = (e) => {
                e.preventDefault();
                setAuthLoading(true);
                setError('');

                // Timeout singkat untuk simulasi proses
                setTimeout(() => {
                    const inputId = String(participantId).trim();
                    const inputPass = String(password).trim();

                    // Mencari kecocokan ID dan Password
                    const found = data.find(p => 
                        String(p.id).trim() === inputId && 
                        String(p.password).trim() === inputPass
                    );

                    if (found) {
                        setUser(found);
                    } else {
                        setError('Nomor peserta atau password salah. Pastikan akun sudah benar.');
                    }
                    setAuthLoading(false);
                }, 600);
            };

            const handleLogout = () => {
                setUser(null);
                setParticipantId('');
                setPassword('');
            };

            if (loading) return (
                <div className="min-h-screen flex flex-col items-center justify-center space-y-4">
                    <div className="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                    <p className="text-slate-500 font-bold uppercase tracking-widest text-xs text-center italic">Memuat Data Galaxy 2026...</p>
                </div>
            );

            if (!user) {
                return (
                    <div className="min-h-screen flex flex-col justify-center items-center p-4 bg-slate-100">
                        <div className="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl overflow-hidden animate-fade-in border border-white">
                            <div className="bg-galaxy p-10 text-center text-white">
                                <h1 className="text-2xl font-black uppercase italic tracking-tighter">Hasil Penyisihan</h1>
                                <p className="text-indigo-200 mt-1 text-xs font-bold tracking-widest uppercase">Galaxy 2026 MAI Amanatul Ummah</p>
                            </div>
                            <form onSubmit={handleLogin} className="p-8 space-y-6">
                                {error && (
                                    <div className="bg-red-50 text-red-600 p-4 rounded-2xl text-xs font-bold border border-red-100 animate-pulse">
                                        {error}
                                    </div>
                                )}
                                <div className="space-y-4">
                                    <div className="group">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5 block ml-1">Nomor Peserta</label>
                                        <input 
                                            type="text" 
                                            value={participantId} 
                                            onChange={(e) => setParticipantId(e.target.value)} 
                                            placeholder="Contoh: 123456" 
                                            className="w-full px-6 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-100 outline-none font-bold transition-all" 
                                            required 
                                        />
                                    </div>
                                    <div className="group">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5 block ml-1">Kata Sandi</label>
                                        <input 
                                            type="password" 
                                            value={password} 
                                            onChange={(e) => setPassword(e.target.value)} 
                                            placeholder="Masukkan Sandi" 
                                            className="w-full px-6 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-100 outline-none font-bold transition-all" 
                                            required 
                                        />
                                    </div>
                                </div>
                                <button type="submit" className="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black text-sm uppercase tracking-widest shadow-xl shadow-indigo-100 active:scale-95 transition-transform">
                                    {authLoading ? "Mengecek..." : "Masuk Sekarang"}
                                </button>
                            </form>
                            <div className="pb-8 text-center px-8">
                                <p className="text-[10px] text-slate-400 font-bold uppercase tracking-tighter">
                                    Galaxy 2026 Portal &copy; MAI Amanatul Ummah
                                </p>
                            </div>
                        </div>
                    </div>
                );
            }

            // Normalisasi status lolos/tidak lolos
            const statusStr = String(user.status || "").toLowerCase().trim();
            const isLolos = statusStr === "lolos";

            return (
                <div className="min-h-screen bg-[#f8fafc] pb-20 animate-fade-in">
                    <nav className="bg-white/90 backdrop-blur-md border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
                        <div className="flex items-center gap-2">
                            <div className="bg-indigo-600 p-2 rounded-xl text-white shadow-lg">
                                <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>
                            </div>
                            <span className="font-black text-slate-800 italic uppercase text-sm tracking-tight">Galaxy 2026</span>
                        </div>
                        <button onClick={handleLogout} className="text-slate-400 font-bold text-[10px] uppercase bg-slate-50 px-4 py-2 rounded-xl border border-slate-200 hover:text-red-500 hover:border-red-200 transition-all">Keluar</button>
                    </nav>

                    <main className="max-w-4xl mx-auto mt-8 px-4">
                        {/* Status Hero Card */}
                        <div className={`rounded-[3rem] p-12 mb-8 text-center shadow-2xl text-white relative overflow-hidden ${isLolos ? 'bg-gradient-to-br from-indigo-600 via-blue-700 to-emerald-600' : 'bg-gradient-to-br from-slate-700 to-slate-900'}`}>
                            <div className="relative z-10">
                                <div className="inline-flex p-6 rounded-3xl bg-white/20 mb-6 backdrop-blur-2xl border border-white/20">
                                    {isLolos ? (
                                        <svg xmlns="http://www.w3.org/2000/svg" className="w-16 h-16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                                    ) : (
                                        <svg xmlns="http://www.w3.org/2000/svg" className="w-16 h-16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                                    )}
                                </div>
                                <h2 className="text-4xl md:text-6xl font-black mb-4 tracking-tighter uppercase italic">{isLolos ? 'Lolos Quarter Final!' : 'Belum Berhasil'}</h2>
                                <p className="font-bold text-lg md:text-xl opacity-90 max-w-2xl mx-auto leading-relaxed">
                                    {isLolos 
                                        ? `Selamat! Anda berhasil melaju ke babak selanjutnya pada bidang ${user['bidang lomba'] || 'Pilihan'}.` 
                                        : 'Terima kasih atas perjuangan Anda. Tetap semangat dan jadikan ini pengalaman berharga untuk masa depan.'}
                                </p>
                            </div>
                        </div>

                        <div className="grid md:grid-cols-5 gap-8">
                            {/* Profile Data */}
                            <div className="md:col-span-3 space-y-6">
                                <div className="bg-white rounded-[2rem] p-8 shadow-sm border border-slate-200">
                                    <h3 className="text-sm font-black text-slate-800 mb-6 uppercase tracking-widest flex items-center gap-2">
                                        <div className="w-1.5 h-1.5 bg-indigo-600 rounded-full"></div>
                                        Informasi Peserta
                                    </h3>
                                    <div className="space-y-4">
                                        {[
                                            { label: 'Nama Lengkap', value: user.namasiswa },
                                            { label: 'Nomor Peserta', value: user.id, mono: true },
                                            { label: 'Bidang Lomba', value: user['bidang lomba'], highlight: true },
                                            { label: 'Asal Sekolah', value: user.asalsekolah },
                                        ].map((item, i) => (
                                            <div key={i} className="flex flex-col sm:flex-row sm:items-center justify-between py-4 border-b border-slate-50 last:border-0 gap-1">
                                                <span className="text-slate-400 text-[10px] font-black uppercase tracking-widest">{item.label}</span>
                                                <span className={`font-black text-sm ${
                                                    item.mono ? 'font-mono text-indigo-600 bg-indigo-50 px-3 py-1 rounded-lg' : 
                                                    item.highlight ? 'text-indigo-800 bg-indigo-50 px-4 py-1.5 rounded-full' : 'text-slate-800'
                                                }`}>
                                                    {item.value || '-'}
                                                </span>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* Results Stats */}
                                <div className="bg-white rounded-[2rem] p-8 shadow-sm border border-slate-200">
                                    <h3 className="text-sm font-black text-slate-800 mb-6 uppercase tracking-widest flex items-center gap-2">
                                        <div className="w-1.5 h-1.5 bg-indigo-600 rounded-full"></div>
                                        Statistik Penilaian
                                    </h3>
                                    <div className="grid grid-cols-2 gap-6">
                                        <div className="bg-slate-50 p-6 rounded-3xl text-center border border-slate-100">
                                            <p className="text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">Skor Akhir</p>
                                            <p className="text-4xl font-black text-indigo-700 tracking-tighter">{user.skor || '0'}</p>
                                        </div>
                                        <div className="bg-slate-50 p-6 rounded-3xl text-center border border-slate-100">
                                            <p className="text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">Peringkat</p>
                                            <p className="text-4xl font-black text-slate-800 tracking-tighter">#{user.peringkat || '-'}</p>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Sidebar Actions */}
                            <div className="md:col-span-2 space-y-6">
                                <div className="bg-white rounded-[2rem] p-8 shadow-sm border border-slate-200 sticky top-24">
                                    <h3 className="text-xs font-black text-slate-400 mb-6 uppercase tracking-widest">Aksi Peserta</h3>
                                    
                                    {isLolos && user.wagroup && (
                                        <div className="p-6 bg-emerald-50 rounded-3xl border border-emerald-100 mb-6 shadow-sm ring-1 ring-emerald-200/50">
                                            <h4 className="font-black text-emerald-900 text-[10px] mb-2 uppercase tracking-widest">Grup Koordinasi</h4>
                                            <p className="text-[10px] text-emerald-700 mb-4 font-bold leading-relaxed">Segera bergabung ke grup WhatsApp resmi babak selanjutnya.</p>
                                            <a 
                                                href={String(user.wagroup).startsWith('http') ? user.wagroup : `https://${user.wagroup}`} 
                                                target="_blank" 
                                                className="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest flex items-center justify-center gap-2 shadow-lg shadow-emerald-200 transition-all active:scale-95"
                                            >
                                                Gabung Grup WA
                                            </a>
                                        </div>
                                    )}

                                    <div className="p-6 bg-slate-50 rounded-3xl border border-slate-100">
                                        <h4 className="font-black text-slate-800 text-[10px] mb-2 uppercase tracking-widest">Pusat Bantuan</h4>
                                        <p className="text-[10px] text-slate-500 mb-4 font-bold leading-relaxed italic">Jika terdapat kendala pada data, silakan hubungi kami.</p>
                                        <div className="flex items-center gap-3 bg-white p-3 rounded-xl border border-slate-200 shadow-sm cursor-pointer group">
                                            <div className="p-2 bg-indigo-50 rounded-lg group-hover:bg-indigo-600 group-hover:text-white transition-all text-indigo-600">
                                                <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                                            </div>
                                            <span className="text-[10px] font-bold text-slate-600 group-hover:text-indigo-600 transition-colors uppercase tracking-tight">Panitia MAI</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>

                    <footer className="text-center mt-20 pb-10 px-6">
                        <div className="w-16 h-1 bg-indigo-100 mx-auto rounded-full mb-6"></div>
                        <p className="text-slate-400 text-[10px] font-black uppercase tracking-[0.4em] mb-2">Galaxy 2026 MAI Amanatul Ummah</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
